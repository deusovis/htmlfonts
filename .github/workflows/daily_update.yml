- name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # Move to 3.12 to avoid the 2026 EOL warning

      - name: Clean and Install Dependencies
        run: |
          # Remove any potential legacy conflicts
          pip uninstall -y google-generativeai google-api-core
          # Install the fresh 2026 SDKs
          pip install google-genai tweepy
