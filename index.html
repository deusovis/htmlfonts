<section class="mt-16">
    <h3 class="text-xl font-bold mb-6 text-slate-400 uppercase tracking-widest text-sm">Recent Font Insights</h3>
    <div id="history-list" class="space-y-4">
        </div>
</section>

<script>
    fetch('history.json')
        .then(res => res.json())
        .then(history => {
            const list = document.getElementById('history-list');
            history.slice(1, 6).forEach(item => {
                const div = document.createElement('div');
                div.className = "p-4 bg-white rounded-xl border border-slate-100 text-sm shadow-sm";
                div.innerHTML = `<span class="text-indigo-600 font-bold">${item.date}:</span> ${item.tip.substring(0, 100)}...`;
                list.appendChild(div);
            });
        });
</script>
