<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>htmlfonts | Modern Typography Pairings</title>
    <style>
        :root { --bg: #0a0a0a; --card: #161616; --text: #ededed; --accent: #3b82f6; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 0; line-height: 1.6; }
        .container { max-width: 900px; margin: 0 auto; padding: 60px 20px; }
        header { text-align: center; margin-bottom: 80px; }
        h1 { font-size: 3.5rem; letter-spacing: -2px; margin: 0; background: linear-gradient(to right, #fff, #666); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .article-card { background: var(--card); border: 1px solid #333; border-radius: 12px; padding: 40px; margin-bottom: 40px; transition: transform 0.2s; }
        .article-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        
        .badge { display: inline-block; padding: 4px 12px; border-radius: 6px; background: rgba(59, 130, 246, 0.1); color: var(--accent); font-weight: 600; font-size: 0.8rem; margin-bottom: 20px; text-transform: uppercase; }
        
        h2 { font-size: 2rem; margin-top: 0; }
        .content { font-size: 1.1rem; color: #b0b0b0; }
        .date { font-size: 0.8rem; color: #555; margin-bottom: 10px; }
        
        /* Preview area for the fonts */
        .preview-box { margin-top: 30px; padding: 20px; border-left: 2px solid var(--accent); background: rgba(255,255,255,0.02); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>htmlfonts.</h1>
            <p style="color: #666;">Curated daily font pairings generated by Gemini 2.5 Flash</p>
        </header>

        <div id="feed">
            </div>
    </div>

    <script>
        async function fetchFeed() {
            const response = await fetch('./frontend/src/data.json');
            const articles = await response.json();
            const feed = document.getElementById('feed');

            feed.innerHTML = articles.map(article => {
                // Generate Google Fonts link for the specific pairing
                const fontUrl = `https://fonts.googleapis.com/css2?family=${article.fonts[0].replace(' ', '+')}&family=${article.fonts[1].replace(' ', '+')}&display=swap`;
                
                // Add the font link to the head dynamically
                const link = document.createElement('link');
                link.rel = 'stylesheet';
                link.href = fontUrl;
                document.head.appendChild(link);

                return `
                    <div class="article-card">
                        <div class="date">${new Date(article.date).toDateString()}</div>
                        <div class="badge">${article.fonts[0]} + ${article.fonts[1]}</div>
                        <h2 style="font-family: '${article.fonts[0]}';">${article.title}</h2>
                        <div class="content" style="font-family: '${article.fonts[1]}';">
                            ${article.content_body.split('\n').map(p => `<p>${p}</p>`).join('')}
                        </div>
                        <div class="preview-box">
                            <span style="font-family: '${article.fonts[0]}'; font-size: 1.5rem;">Headline in ${article.fonts[0]}</span><br>
                            <span style="font-family: '${article.fonts[1]}';">Body text in ${article.fonts[1]}. The quick brown fox jumps over the lazy dog.</span>
                        </div>
                    </div>
                `;
            }).join('');
        }
        fetchFeed();
    </script>
</body>
</html>
